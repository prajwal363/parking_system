<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkEase — Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=4">
</head>
<body>
  <nav>
    <span class="logo"><span class="logo-icon">P</span> ParkEase</span>
  </nav>
  <main style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
    <div style="width:100%; max-width:380px;">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}
          <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}{% endif %}
      {% endwith %}

      <div class="form-card" style="max-width:100%;">
        <div style="text-align:center; margin-bottom:28px;">
          <div style="width:52px; height:52px; background:var(--accent); border-radius:12px; display:inline-flex; align-items:center; justify-content:center; font-size:1.4rem; margin-bottom:12px;">&#128274;</div>
          <h2 style="font-family:var(--font-head); font-size:1.3rem; font-weight:800; letter-spacing:-0.5px;">Admin Login</h2>
          <p style="color:var(--text-dim); font-size:0.82rem; margin-top:4px;">Restricted access only</p>
        </div>

        <form method="POST" action="/admin/login">
          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="admin" required autofocus>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="submit-btn">Login to Dashboard &rarr;</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
